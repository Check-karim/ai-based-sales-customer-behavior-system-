{% extends "base.html" %}
{% block title %}Admin Login - Deluxe Supermarket{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <span class="brand-icon large">&#9733;</span>
      <h1>Admin Login</h1>
      <p>AI Sales & Customer Behavior System</p>
    </div>

    <form method="POST" action="{{ url_for('admin_login') }}" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="Admin username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Admin password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <p class="login-hint">
      <a href="{{ url_for('home') }}">&larr; Back to homepage</a>
    </p>
  </div>
</div>
{% endblock %}
